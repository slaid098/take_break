name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --group dev

      - name: Build with PyInstaller
        shell: pwsh
        run: uv run pyinstaller --noconfirm take_break.spec

      - name: Package release
        shell: pwsh
        run: |
          Compress-Archive -Path dist/take_break/* -DestinationPath dist/take_break.zip

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/take_break.zip
          generate_release_notes: true